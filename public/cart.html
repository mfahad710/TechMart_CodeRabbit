<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - TechMart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/" class="logo">🛒 TechMart</a>
      <div class="nav-links">
        <a href="/" class="btn btn-outline">Continue Shopping</a>
        <div id="authArea"></div>
      </div>
    </nav>
  </header>

  <main class="cart-page">
    <h1>Your Shopping Cart</h1>
    
    <div id="emptyCart" class="empty-cart hidden">
      <p>Your cart is empty</p>
      <a href="/" class="btn btn-primary">Start Shopping</a>
    </div>

    <div id="cartContent" class="cart-content">
      <div class="cart-items" id="cartItems">
        <!-- Cart items loaded dynamically -->
      </div>
      
      <div class="cart-summary">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="shipping">FREE</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">$0.00</span>
        </div>
        <a href="/checkout.html" class="btn btn-primary btn-full" id="checkoutBtn">Proceed to Checkout</a>
        <button class="btn btn-outline btn-full" id="clearCartBtn">Clear Cart</button>
      </div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
  <script>
    async function loadCart() {
      try {
        const response = await fetch('/api/cart');
        const data = await response.json();
        
        const emptyCart = document.getElementById('emptyCart');
        const cartContent = document.getElementById('cartContent');
        const cartItems = document.getElementById('cartItems');
        
        if (data.items.length === 0) {
          emptyCart.classList.remove('hidden');
          cartContent.classList.add('hidden');
          return;
        }
        
        emptyCart.classList.add('hidden');
        cartContent.classList.remove('hidden');
        
        cartItems.innerHTML = data.items.map(item => `
          <div class="cart-item" data-product-id="${item.productId}">
            <div class="item-image">
              <img src="images/${item.product.image}" alt="${item.product.name}">
            </div>
            <div class="item-details">
              <h3>${item.product.name}</h3>
              <p class="item-price">$${item.product.price.toFixed(2)}</p>
            </div>
            <div class="item-quantity">
              <button class="qty-btn" onclick="updateQuantity(${item.productId}, ${item.quantity - 1})">-</button>
              <span class="qty-value">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQuantity(${item.productId}, ${item.quantity + 1})">+</button>
            </div>
            <div class="item-total">
              $${(item.product.price * item.quantity).toFixed(2)}
            </div>
            <button class="remove-btn" onclick="removeItem(${item.productId})" aria-label="Remove item">✕</button>
          </div>
        `).join('');
        
        document.getElementById('subtotal').textContent = `$${data.total}`;
        document.getElementById('total').textContent = `$${data.total}`;
        updateCartCount();
      } catch (error) {
        console.error('Error loading cart:', error);
      }
    }

    async function updateQuantity(productId, quantity) {
      if (quantity < 1) {
        removeItem(productId);
        return;
      }
      
      try {
        await fetch(`/api/cart/${productId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity })
        });
        loadCart();
      } catch (error) {
        console.error('Error updating quantity:', error);
      }
    }

    async function removeItem(productId) {
      try {
        await fetch(`/api/cart/${productId}`, { method: 'DELETE' });
        showToast('Item removed from cart');
        loadCart();
      } catch (error) {
        console.error('Error removing item:', error);
      }
    }

    document.getElementById('clearCartBtn').addEventListener('click', async () => {
      try {
        await fetch('/api/cart', { method: 'DELETE' });
        showToast('Cart cleared');
        loadCart();
      } catch (error) {
        console.error('Error clearing cart:', error);
      }
    });

    loadCart();
    updateAuthArea();
  </script>
</body>
</html>
