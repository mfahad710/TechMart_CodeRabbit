<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TechMart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/" class="logo">🛒 TechMart</a>
      <div class="nav-links">
        <a href="/cart.html" class="btn btn-outline">Back to Cart</a>
      </div>
    </nav>
  </header>

  <main class="checkout-page">
    <h1>Checkout</h1>
    
    <div class="checkout-container">
      <form id="checkoutForm" class="checkout-form">
        <section class="form-section">
          <h2>Shipping Information</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" required>
            </div>
          </div>
          <div class="form-group">
            <label for="address">Street Address</label>
            <input type="text" id="address" name="address" placeholder="123 Main Street" required>
          </div>
          <div class="form-group">
            <label for="address2">Apt, Suite, etc. (optional)</label>
            <input type="text" id="address2" name="address2" placeholder="Apt 4B">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
              <label for="state">State</label>
              <select id="state" name="state" required>
                <option value="">Select State</option>
                <option value="CA">California</option>
                <option value="NY">New York</option>
                <option value="TX">Texas</option>
                <option value="FL">Florida</option>
                <option value="MI">Michigan</option>
                <option value="WA">Washington</option>
                <option value="IL">Illinois</option>
              </select>
            </div>
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input type="text" id="zip" name="zip" pattern="[0-9]{5}" placeholder="12345" required>
            </div>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" required>
          </div>
        </section>

        <section class="form-section">
          <h2>Payment Information</h2>
          <div class="form-group">
            <label for="cardName">Name on Card</label>
            <input type="text" id="cardName" name="cardName" required>
          </div>
          <div class="form-group">
            <label for="cardNumber">Card Number</label>
            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="expiry">Expiration Date</label>
              <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="form-group">
              <label for="cvv">CVV</label>
              <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
            </div>
          </div>
        </section>

        <div id="errorMessage" class="error-message hidden"></div>
        <button type="submit" class="btn btn-primary btn-full btn-large" id="placeOrderBtn">Place Order</button>
      </form>

      <div class="order-summary-sidebar">
        <h2>Order Summary</h2>
        <div id="orderItems" class="order-items">
          <!-- Items loaded dynamically -->
        </div>
        <div class="summary-totals">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>FREE</span>
          </div>
          <div class="summary-row">
            <span>Tax</span>
            <span id="tax">$0.00</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">$0.00</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="orderConfirmation" class="modal hidden">
    <div class="modal-content">
      <h2>🎉 Order Confirmed!</h2>
      <p>Thank you for your order.</p>
      <p>Order ID: <span id="orderId"></span></p>
      <p>A confirmation email has been sent to your email address.</p>
      <a href="/" class="btn btn-primary">Continue Shopping</a>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
  <script>
    async function loadOrderSummary() {
      try {
        const response = await fetch('/api/cart');
        const data = await response.json();
        
        if (data.items.length === 0) {
          window.location.href = '/cart.html';
          return;
        }
        
        const orderItems = document.getElementById('orderItems');
        orderItems.innerHTML = data.items.map(item => `
          <div class="order-item">
            <span class="item-name">${item.product.name} × ${item.quantity}</span>
            <span class="item-price">$${(item.product.price * item.quantity).toFixed(2)}</span>
          </div>
        `).join('');
        
        const subtotal = parseFloat(data.total);
        const tax = subtotal * 0.08;
        const total = subtotal + tax;
        
        document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
        document.getElementById('total').textContent = `$${total.toFixed(2)}`;
      } catch (error) {
        console.error('Error loading order summary:', error);
      }
    }

    // Format card number with spaces
    document.getElementById('cardNumber').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
      value = value.match(/.{1,4}/g)?.join(' ') || value;
      e.target.value = value;
    });

    // Format expiry date
    document.getElementById('expiry').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length >= 2) {
        value = value.slice(0, 2) + '/' + value.slice(2);
      }
      e.target.value = value;
    });

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('errorMessage');
      
      const shipping = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        address: document.getElementById('address').value,
        address2: document.getElementById('address2').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zip: document.getElementById('zip').value,
        phone: document.getElementById('phone').value
      };
      
      try {
        const response = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ shipping })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          errorDiv.textContent = data.error;
          errorDiv.classList.remove('hidden');
          return;
        }
        
        document.getElementById('orderId').textContent = data.order.id;
        document.getElementById('orderConfirmation').classList.remove('hidden');
      } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.classList.remove('hidden');
      }
    });

    loadOrderSummary();
  </script>
</body>
</html>
